name: Build and Release Debian Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  build_and_release:
    name: Build and Release Debian Package
    # A DKMS source package is Architecture: all -- nothing is compiled at
    # package-build time (the module is built on the target by DKMS), so a
    # plain x86 runner is fine; no ARM/cross-compile needed.
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            debhelper \
            dh-dkms \
            dkms \
            devscripts
          sudo apt-get clean autoclean --yes
          sudo apt-get autoremove --yes
          sudo rm -rf /var/cache/apt/archives* /var/lib/apt/lists/*

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Debian package
        run: |
          debuild -us -uc -b && cp -a ../*.deb ./

      - name: Get version
        id: get_version
        run: |
          echo "version=$(dpkg-parsechangelog --show-field Version)" >> $GITHUB_OUTPUT

      - name: Get commit hash
        id: get_commit_hash
        uses: prompt/actions-commit-hash@v3

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          name: v${{ steps.get_version.outputs.version }}-${{ steps.get_commit_hash.outputs.short }}
          tag_name: v${{ steps.get_version.outputs.version }}-${{ steps.get_commit_hash.outputs.short }}
          generate_release_notes: true
          files: |
            ./*.deb
